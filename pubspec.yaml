name: emehanika_tech
description: Test project for Emehanika Tech
version: 1.0.0+1
environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  dio: ^5.7.0
  flutter_svg: ^2.2.0
  json_annotation: ^4.8.0
  equatable: ^2.0.5
  flutter_bloc: ^8.1.5
  cupertino_icons: ^1.0.2
  go_router: ^16.1.0
  dartz: ^0.10.1
  get_it: ^9.0.5
  intl: ^0.20.2
  shared_preferences: ^2.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.3.3
  json_serializable: ^6.2.0
  flutter_gen_runner: ^5.4.0
  auto_route_generator:
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
  fonts:
    - family: Satoshi
      fonts:
        - asset: assets/fonts/Satoshi-Regular.otf
          weight: 400
        - asset: assets/fonts/Satoshi-Bold.otf
          weight: 700


